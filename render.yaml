services:
  - type: web
    name: zcrypt-dev
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LEAD_RECIPIENT
        value: zcrypt83@proton.me
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "Portfolio Contact <zcrypt83@proton.me>"
